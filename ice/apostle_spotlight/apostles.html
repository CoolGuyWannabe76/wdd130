<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>

        body {
            background: #e8eced;
            display: grid;
            place-items: center;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }        
        
        .card {
            border: solid 5px black;
            border-radius: 25px;
            max-width: 1200px;
            text-align: center;
            background-image: url("images/christus.webp");
            background-position: right top;
            background-repeat: no-repeat;
        }

        .first-pres img {
            max-width: 100px;
            border: solid 7px white;
            border-radius: 100%;
        }

        #prophet {
            max-width: 120px;
        }

        #the-12 {
            display: grid;
            grid-template-columns: auto auto auto auto;
            grid-template-rows: auto auto auto auto;
            gap: 10px 10px;
            margin: 10px 100px;
        }

        #the-12 img {
            max-width: 80px;
            border: solid 5px white;
            border-radius: 100%;
        }

        img:hover, #the-12 img:hover {
            border-color: black;
            transition: transform 1s;
            transform: scale(1.1);
        }



    </style>
</head>
<body>
    <div class="card">
        <h1>First Presidency</h1>
        <div class="first-pres">
            <img src="images/eyring.webp" alt="">
            <img src="images/oaks.webp" alt="" id="prophet">
            <img src="images/christofferson.webp" alt="">
        </div>
        <h4>Quorom of the 12 Apostles</h1>
        <div id="the-12">
            <img src="images/uchtdorf.webp" alt="">
            <img src="images/bednar.webp" alt="">
            <img src="images/cook.webp" alt="">
            <img src="images/anderson.webp" alt="">
            <img src="images/rasband.webp" alt="">
            <img src="images/stevenson.webp" alt="">
            <img src="images/renlund.webp" alt="">
            <img src="images/gong.webp" alt="">
            <img src="images/soares.webp" alt="">
            <img src="images/kearon.webp" alt="">
            <img src="images/causse.webp" alt="">
            <img src="images/gilbert.webp" alt="">
        </div>
    </div>
</body>
</html>
